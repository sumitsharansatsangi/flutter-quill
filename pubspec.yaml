name: flutter_quill
description: A rich text editor supporting mobile and web (Demo App @ bulletjournal.us)
version: 6.3.4
#author: bulletjournal
homepage: https://bulletjournal.us/home/index.html
repository: https://github.com/singerdmx/flutter-quill
publish_to: none
environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.17.0
  flutter_colorpicker: ^1.1.0
  flutter_keyboard_visibility:
    git: https://github.com/kumsumit/flutter_keyboard_visibility.git
  quiver: ^3.2.2
  tuple: ^2.0.2
  url_launcher:
    git: https://github.com/kumsumit/url_launcher.git
  lints: ^6.1.0
  characters: ^1.4.1
  diff_match_patch: ^0.4.1
  i18n_extension:
    git: https://github.com/sumitsharansatsangi/i18n_extension.git
  device_info_plus:
    git: https://github.com/kumsumit/device_info_plus.git
  platform: ^3.1.6
  pasteboard:
    git: https://github.com/kumsumit/pasteboard.git
dev_dependencies:
  flutter_test:
    sdk: flutter

